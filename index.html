<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hábitos - Principal</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FFFFFF">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="preconnect" href="https://rsms.me/">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./style-dark.css">
</head>
<body>

<div id="overlay" class="sheet-overlay"></div>

<header>
  <div class="topbar">
    <div class="settings-actions">
        <button onclick="exportData()" class="btn-act">􀈂</button>
        <label for="importFile" class="btn-act" style="cursor:pointer;">􀈻</label>
        <button class="btn-act" id="addHabitBtn">􀁍</button>
        <input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(event)">
    </div>
    <div class="bigt">Hábitos</div>
    <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 4px;">
        <div id="dateSelector">
            <input type="date" id="selectedDate">
        </div>
  </div>
</header>

<main id="habitsContainer"></main>

<!-- SHEET CREAR / EDITAR HÁBITO -->
<div id="createSheet" class="sheetContent">
   <div class="headerB">
        <div class="centro">
            <button class="btn-action" onclick="handleCloseHabit()">Cancelar</button>
            <div class="subtitle">Hábito</div>
            <button class="btn-action" onclick="saveHabit()" style="font-weight: 560;">Guardar</button>
        </div>
    </div>

    <div class="iconTrigger" id="iconPickerTrigger">􀓔</div>

    <div class="form">
        <div class="table">
            <div class="row">
                <input type="text" id="hName" class="field" style="font-weight: 540;" placeholder="Nombre del hábito">
            </div>
        </div>
        <div class="label-table">
            Repeticiones
        </div>
        <div class="table">
            <div class="row">
                <span class="label">Objetivo</span>
                <input type="number" id="hGoal" class="select" placeholder="Cantidad" inputmode="numeric">
            </div>
            <div class="row">
                <span class="label">Aumento</span>
                <input type="number" id="hStep" class="select" placeholder="Paso" inputmode="numeric">
            </div>
        </div>
        <div class="table">
            <div class="row"><input type="text" id="uSing" class="field" placeholder="Unidad singular"></div>
            <div class="row"><input type="text" id="uPlur" class="field" placeholder="Unidad plural"></div>
        </div>

        <div class="label-table">
            horario
        </div>
        <div class="table" id="diasTable">
            <!-- Las filas se generarán con JS -->
        </div>
        <!-- Tabla unificada: toggle + hora -->
        <div class="table" id="hourTable">
            <div class="row" style="cursor:pointer;" onclick="toggleHourEnabled()">
                <span>Momento específico</span>
                <div class="toggleSwitch" id="hourToggle">
                    <div class="toggleKnob"></div>
                </div>
            </div>
            <div class="row" id="timeRowContainer" style="display: none;">
                <span class="label">Hora</span>
                <input type="time" id="hTime" class="select">
            </div>
        </div>

        <!-- Botón eliminar (solo edición) -->
        <div id="deleteHabitRow" class="table" style="margin-top: 16px; display: none;">
            <div class="row" style="justify-content: center;">
                <button onclick="deleteHabit()" class="btn-del">Eliminar</button>
            </div>
        </div>
   </div>
</div>

<!-- SHEET VER HÁBITO -->
<div id="viewSheet" class="sheetContent" style="text-align: center;">
   <div class="headerB">
        <div class="centro">
            <button class="btn-action" onclick="handleCloseHabit()">Cerrar</button>
            <button class="btn-action" onclick="editHabit()">Editar</button>
        </div>
    </div>

    <div class="form" id="view">
        <div class="table" style="padding: 18px;">
            <div id="vIcon"></div>
            <div class="habito" id="vName"></div>
            <div id="vUnitLabel"></div>

            <div class="qtyControls">
                <button class="plusminus" onclick="updateQty(-1)">􀅽</button>
                <input type="number" id="vQtyManual" class="manualQtyInput" value="0">
                <button class="plusminus" onclick="updateQty(1)">􀅼</button>
            </div>
        </div>
        
        <div class="table" style="margin-top: 8px; cursor: pointer;" onclick="openStreak()">
            <div class="row">
                <div class="streakRow" style="display: flex; align-items: center; gap: 6px;">
                    <span class="row-icon" style="color: #ff9100;">􀙭</span>
                    <span style="font-weight: 500;">Racha</span>
                </div>
                <div class="select">
                    <span id="streakNumberInView">0</span>
                    <span class="chevron">􀆊</span>
                </div>
                
            </div>
        </div>

        <div class="down">
            <div class="btones">
                <button class="btn btn-gray" onclick="clearQty()">Vaciar</button>
                <button class="btn btn-gray" onclick="openAddQuantitySheet()">Agregar</button>
                <button class="btn btn-blue" onclick="setComplete()">Completar</button>
            </div>
        </div>
    </div>
</div>

<!-- SHEET AGREGAR CANTIDAD PERSONALIZADA -->
<div id="addQuantitySheet" class="sheetContent addQtySheet">
    <div class="headerB">
        <div class="centro">
            <button class="btn-action" onclick="closeSheet('addQuantitySheet')">Cancelar</button>
            <div class="subtitle">Agregar cantidad</div>
            <button class="btn-action" onclick="confirmAddQuantity()">Añadir</button>
        </div>
    </div>
    <div style="padding: 20px;">
        <input type="number" id="addQtyInput" class="addQtyInput" placeholder="0" value="0" step="1" inputmode="numeric">
        <div class="addQtyActions">
            <button class="addQtyBtn addQtyBtn-secondary" onclick="closeSheet('addQuantitySheet')">Cancelar</button>
            <button class="addQtyBtn addQtyBtn-primary" onclick="confirmAddQuantity()">Añadir</button>
        </div>
    </div>
</div>

<!-- ICON PICKER -->
<div id="iconPickerSheet" class="sheetContent">
    <div class="headerIcons">
        <div class="duo">
            <button class="btn-action" onclick="closeSheet('iconPickerSheet'); openSheet('createSheet');">Atrás</button>
            <div class="subtitle">Icono</div>
            <button class="btn-action" id="confirmIconBtn" style="font-weight: 560;">Aplicar</button>
        </div>
    </div>
    <div class="content">
        <div class="table2">
            <div class="row">
                <span class="label">Color</span>
                <div class="colorPickerWrap">
                    <input type="color" id="iconColorPicker" value="#007AFF">
                    <div class="colorPreview" id="colorPreview" style="background:#007AFF;"></div>
                </div>
            </div>
        </div>
        <div class="iconsbg">
            <div class="searchBar">
                <div class="search">􀊫</div>
                <input type="text" id="iconSearch" placeholder="Buscar íconos" autocomplete="off">
            </div>
            <div id="iconGrid"></div>
        </div>
    </div>
    
</div>

<!-- STREAK SHEET (con gráfico SVG) -->
<div id="streakSheet" class="sheetContent">
   <div class="headerB">
        <div class="conjunto">
            <button class="btn-action" onclick="closeSheet('streakSheet')">Cerrar</button>
        </div>
    </div>

    <div class="screen">
        <div class="streakBadge">
            <div class="fire">􀙭</div>
            <div id="streakValue">0</div>
            <div id="streakText">Días de racha</div>
        </div>

        <hr>

        <div class="subt">Actividad por mes</div>
        <div class="month">
            <div class="datenav">
                <button class="navbtns" onclick="changeMonth(-1)">􀯶</button>
                <div class="heading" id="calTitle"></div>
                <button class="navbtns" onclick="changeMonth(1)">􀯻</button>
            </div>
            <div class="calGrid" id="calGrid"></div>
        </div>

        <div class="subt">Progreso semanal</div>
        <div class="lineChartContainer">
            <svg id="weeklyLineSvg" viewBox="0 0 400 200" preserveAspectRatio="xMidYMid meet" style="width:100%; height:auto; border-radius: 16px;"></svg>
        </div>
    </div>
</div>

<!-- SHEET REORDENAR HÁBITOS -->
<div id="reorderSheet" class="sheetContent">
    <div class="headerB">
        <div class="spaceline"><div class="line"></div></div>
        <div class="centro">
            <button class="btn-action" onclick="closeSheet('reorderSheet')">Cerrar</button>
            <div class="subtitle">Reordenar hábitos</div>
            <button class="btn-action" onclick="saveReorder()">Guardar</button>
        </div>
    </div>
    <div id="reorderList" class="reorderList" style="margin: 16px; display: flex; flex-direction: column; gap: 12px;"></div>
</div>

<script src="icons.js"></script>
<script src="habits.js"></script>
</body>
</html>
